<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f; color: #f0f0f5;
      font-family: 'DM Mono', monospace;
      width: 280px; padding: 20px;
    }
    h2 { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
    .sub { color: #6b6b80; font-size: 11px; margin-bottom: 16px; }
    .status {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 14px; border-radius: 10px;
      border: 1px solid #2a2a3a; background: #111118;
      margin-bottom: 14px;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .dot.on { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
    .dot.off { background: #374151; }
    .status-text { flex: 1; font-size: 12px; color: #9ca3af; }
    .toggle {
      width: 100%; padding: 10px; border-radius: 8px;
      font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 600;
      cursor: pointer; border: none; transition: all 0.2s;
      margin-bottom: 12px;
    }
    .toggle.on { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
    .toggle.off { background: #00ff88; color: #000; }
    .stat { display: flex; justify-content: space-between; font-size: 12px; padding: 6px 0; border-bottom: 1px solid #1a1a24; }
    .stat-val { color: #ef4444; font-weight: 700; }
    .open-btn {
      display: block; width: 100%; margin-top: 14px; padding: 10px;
      background: #111118; border: 1px solid #2a2a3a; border-radius: 8px;
      color: #6b6b80; font-family: 'DM Mono', monospace; font-size: 11px;
      cursor: pointer; text-align: center;
    }
    .open-btn:hover { color: #00ff88; border-color: rgba(0,255,136,0.3); }
  </style>
</head>
<body>
  <h2>Goal<span style="color:#00ff88">Guard</span> 🛡️</h2>
  <div class="sub">Distraction blocker · LearnOS</div>

  <div class="status">
    <div class="dot" id="dot"></div>
    <div class="status-text" id="statusText">Loading...</div>
  </div>

  <button class="toggle" id="toggleBtn">...</button>

  <div class="stat"><span>Blocked today</span><span class="stat-val" id="blockCount">0</span></div>
  <div class="stat"><span>Distractions logged</span><span class="stat-val" id="distractCount">0</span></div>

  <button class="open-btn" id="openApp">Open GoalGuard →</button>

  <script src="popup.js"></script>
</body>
</html>
